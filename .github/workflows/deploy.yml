name: Build & Deploy YesChef Website
 
on:
  # Trigger manually from the GitHub Actions tab
  workflow_dispatch:
 
  # OR trigger automatically on any push to main
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'yeschef-seo/**'
      - '.github/workflows/deploy.yml'
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      # ── 3. Fetch latest recipes.json from Cloudflare R2 ─────────────────────
      - name: Fetch recipes.json from Cloudflare R2
        run: |
          curl -fsSL \
            "https://pub-3ae50d56fa834654954be23601470560.r2.dev/assets/recipes.json" \
            -o web/recipes/recipes.json
          echo "✓ recipes.json fetched ($(wc -c < web/recipes/recipes.json) bytes)"
 
      # ── 4. Generate main site recipe pages ───────────────────────────────────
      #    Runs from web/recipes/ so OUTPUT_DIR="." places slugs directly
      #    as siblings: web/recipes/<slug>/index.html
      - name: Generate main site recipe pages
        working-directory: web/recipes
        env:
          OUTPUT_DIR_OVERRIDE: "."
        run: |
          python3 generate.py
          echo "✓ Main site recipe pages generated"
 
      # ── 5. Generate SEO pages ────────────────────────────────────────────────
      #    Copies the fresh JSON into yeschef-seo/ then runs the same script
      #    with a different output directory.
      - name: Generate SEO pages
        run: |
          cp web/recipes/recipes.json yeschef-seo/recipes.json
          cd yeschef-seo
          OUTPUT_DIR_OVERRIDE=output python3 generate.py
          echo "✓ SEO pages generated"
 
      # ── 6. Deploy web/ to gh-pages ───────────────────────────────────────────
      #    CNAME is written on every deploy — domain never gets wiped again
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          cname: tryyeschef.app
          force_orphan: false
          commit_message: "deploy: auto-build from ${{ github.sha }}"