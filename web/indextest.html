  <style>
    :root {

    html { scroll-behavior: smooth; }

      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);

    }

    main {

      margin: 0 auto;

    /* ── SEARCH ──────────────────────────────── */
    .search-wrap {

    .search-input {

    .chip {

    .top10-card {

      background: var(--dark-card);

      color: var(--white);

    .top10-card:hover { transform: translateY(-3px); }
 
    .top10-card img {

      height: 100px;
      object-fit: cover;
      display: block;
    }
 
    .top10-card-body {
      padding: 8px;
    }
 
    .top10-card-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      line-height: 1.3;
    }
 
    .top10-card-desc {
      font-size: 11px;
      font-style: italic;
      color: var(--white-dim);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;

    /* ── SEARCH RESULTS (hidden by default) ───── */
    .results-section {
      display: none;
      margin-bottom: 32px;
      animation: fadeUp 0.3s ease both;
    }
 
    .results-section.active { display: block; }
 
    .result-card {

    .result-card-img {

    .ad-strip {

  </style>
</head>

  <script>
    const JSON_URL = 'https://pub-3ae50d56fa834654954be23601470560.r2.dev/assets/recipes.json';
    let ALL_RECIPES = [];
 
    // ── Slug generator ───────────────────────────────────────────────────────
    function toSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
 
    // ── Card builders ────────────────────────────────────────────────────────
    function carouselCard(r) {
      return `<a href="/recipes/${toSlug(r.name)}/" class="carousel-card">
        ${r.imageUrl ? `<img src="${r.imageUrl}" alt="${r.name}" loading="lazy">` : `<div class="carousel-card img-fallback" style="height:200px;"></div>`}
        <div class="carousel-card-body">
          <div class="carousel-card-name">${r.name}</div>
          <div class="carousel-card-desc">${r.description || ''}</div>
        </div>
      </a>`;
    }
 
    function top10Card(r) {
      return `<a href="/recipes/${toSlug(r.name)}/" class="top10-card">
        ${r.imageUrl ? `<img src="${r.imageUrl}" alt="${r.name}" loading="lazy">` : `<div class="top10-card img-fallback" style="height:100px;"></div>`}
        <div class="top10-card-body">
          <div class="top10-card-name">${r.name}</div>
          <div class="top10-card-desc">${r.description || ''}</div>
        </div>
      </a>`;
    }
 
    function resultCard(r) {
      return `<a href="/recipes/${toSlug(r.name)}/" class="result-card">
        ${r.imageUrl ? `<img src="${r.imageUrl}" alt="${r.name}" class="result-card-img">` : `<div class="result-card-img img-fallback"></div>`}
        <div class="result-card-body">
          <span class="result-card-tag">${r.category || ''}</span>
          <div class="result-card-name">${r.name}</div>
          <div class="result-card-desc">${r.description || ''}</div>
        </div>
      </a>`;
    }
 
    function pickRandom(arr) {
      return arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;
    }
 
    // ── Show/hide results vs home sections ───────────────────────────────────
    function showResults(results, label) {
      const section = document.getElementById('results-section');
      const header  = document.getElementById('results-header');
      const list    = document.getElementById('results-list');
      const carousel = document.querySelector('.carousel-section');
      const top10    = document.querySelector('.top10-section');
 
      if (results.length === 0) {
        list.innerHTML = `<p style="color:rgba(255,255,255,0.4);font-style:italic;padding:12px 0;">No recipes found. Try a different search.</p>`;
      } else {
        list.innerHTML = results.map(resultCard).join('');
      }
 
      header.textContent = label;
      section.classList.add('active');
      carousel.style.display = 'none';
      top10.style.display = 'none';
    }
 
    function clearResults() {
      const section = document.getElementById('results-section');
      const carousel = document.querySelector('.carousel-section');
      const top10    = document.querySelector('.top10-section');
      section.classList.remove('active');
      carousel.style.display = '';
      top10.style.display = '';
      document.getElementById('search-input').value = '';
      // re-highlight no chip
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-active'));
    }
 
    // ── Fuzzy search (mirrors Flutter service logic) ──────────────────────────
    function searchRecipes(query) {
      const q = query.toLowerCase().trim();
      if (!q) return [];
 
      // Strict category match first
      const cats = ['cocktail','starter','main','sides','dessert','bread'];
      if (cats.includes(q)) {
        return ALL_RECIPES.filter(r => (r.category || '').toLowerCase() === q);
      }
 
      return ALL_RECIPES.filter(r => {
        const fields = [r.name, r.source, r.category, r.keywords, r.chef, r.description]
          .map(f => (f || '').toLowerCase());
        if (fields.some(f => f.includes(q))) return true;
 
        const inIngredients = (r.ingredients || []).some(ing =>
          (ing.item || '').toLowerCase().includes(q) || (ing.note || '').toLowerCase().includes(q)
        );
        if (inIngredients) return true;
 
        const inSteps = (r.steps || []).some(s => (s.instruction || '').toLowerCase().includes(q));
        if (inSteps) return true;
 
        const inSubs = (r.sub_recipes || []).some(sub =>
          (sub.name || '').toLowerCase().includes(q) ||
          (sub.ingredients || []).some(i => (i.item || '').toLowerCase().includes(q))
        );
        return inSubs;
      });
    }
 
    // ── Main search trigger ───────────────────────────────────────────────────
    function runSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) { clearResults(); return; }
      const results = searchRecipes(q);
      showResults(results, `Results for "${q}"`);
    }
 
    // ── Category chip click ───────────────────────────────────────────────────
    function filterByCategory(cat, chipEl) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-active'));
      chipEl.classList.add('chip-active');
      document.getElementById('search-input').value = '';
      const results = ALL_RECIPES.filter(r =>
        (r.category || '').toLowerCase() === cat.toLowerCase()
      );
      showResults(results, cat);
    }
 
    // ── Wire up search input ──────────────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
    searchInput.addEventListener('input', e => { if (e.target.value === '') clearResults(); });
 
    // ── Load recipes & populate page ─────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        const items = Array.isArray(data) ? data : data.recipes;
        ALL_RECIPES = items.map(item => item.recipe ?? item);
      } catch (e) {
        console.warn('Failed to load recipes:', e);
        return;
      }
 
      // Curated carousel: 1 random per category
      const cats = ['Cocktail', 'Bread', 'Starter', 'Main', 'Sides', 'Dessert'];
      const used = new Set();
      const curated = [];
      for (const cat of cats) {
        const pool = ALL_RECIPES.filter(r =>
          r.category && r.category.toLowerCase() === cat.toLowerCase() && !used.has(r.name)
        );
        const pick = pickRandom(pool);
        if (pick) { curated.push(pick); used.add(pick.name); }
      }
      document.getElementById('curated-carousel').innerHTML = curated.map(carouselCard).join('');
 
      // Top 10: first 10 in JSON order
      document.getElementById('top10-track').innerHTML = ALL_RECIPES.slice(0, 10).map(top10Card).join('');
    }
 
    init();
  </script>
 
</body>
</html>
