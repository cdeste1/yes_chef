<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{name}} | YesChef</title>

  <meta name="description" content="{{description}}">
  <meta name="keywords" content="{{keywords}}, {{chef}}, {{source}}">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:title" content="{{name}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:image" content="{{imageUrl}}">
  <meta property="og:type" content="article">

  <!-- Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "{{name}}",
    "author": {
      "@type": "Person",
      "name": "{{chef}}"
    },
    "description": "{{description}}",
    "image": "{{imageUrl}}",
    "recipeYield": "{{yield}}",
    "recipeCategory": "{{category}}",
    "keywords": "{{keywords}}, {{chef}}, {{source}}",
    "recipeCuisine": "Italian",
    "recipeIngredient": [
      {{ingredients_json}}
    ],
    "recipeInstructions": [
      {{instructions_json}}
    ]
  }
  </script>

  <style>
    body { font-family: Arial; padding: 20px; max-width: 700px; margin:auto; }
    img { width:100%; border-radius:12px; }

    .meta { opacity:0.7; font-size:14px; margin-bottom:10px; }

    .ad-inline { margin: 30px 0; text-align:center; }

    #native-footer {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 28px;
      padding: 10px 18px;
      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      z-index: 9999;
    }

    #native-footer a {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      text-decoration: none;
      font-size: 11px;
    }

    #native-footer img {
      width: 22px;
      height: 22px;
      filter: invert(1);
    }
  </style>
</head>

<body>

<h1>{{name}}</h1>

<div class="meta">
  Chef: {{chef}} <br>
  Source: {{source}}
</div>

<img src="{{imageUrl}}" alt="{{name}}">

<p>{{description}}</p>

<h2>Ingredients</h2>
<ul>
{{ingredients_html}}
</ul>

<div class="ad-inline">
  <ins class="adsbygoogle"
       style="display:block;height:90px"
       data-ad-client="ca-pub-2497070669800198"
       data-ad-slot="YOUR_SLOT_ID"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<h2>Instructions</h2>
<ol>
{{instructions_html}}
</ol>

<!-- Footer -->
<div id="native-footer">
  <a href="https://instagram.com/yeschefbychris/" target="_blank">
    <img src="/icons/instagram.svg"><span>IG</span>
  </a>
  <a href="https://apps.apple.com/us/app/yes-chef-by-chris/id6759258837" target="_blank">
    <img src="/icons/apple.svg"><span>App</span>
  </a>
</div>

</body>
</html>
