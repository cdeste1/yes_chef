name: Build & Deploy YesChef Website
 
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'recipes/**'
      - 'web/**'
      - 'yeschef-seo/**'
      - '.github/workflows/deploy.yml'
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      # ── 3. Merge all individual recipe JSONs → single recipes.json ───────────
      - name: Merge recipe files
        run: |
          python3 tools/merge_recipes.py \
            --input   recipes \
            --output  merged/recipes.json
          echo "✓ Merged $(ls recipes/*.json | wc -l) recipe files"
 
      # ── 4. Upload merged recipes.json to Cloudflare R2 ───────────────────────
      - name: Upload recipes.json to R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          pip install awscli --quiet
          aws s3 cp merged/recipes.json \
            s3://yeschef-recipes/assets/recipes.json \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --content-type application/json
          echo "✓ recipes.json uploaded to R2"
 
      # ── 5. Copy merged JSON for site generation ──────────────────────────────
      - name: Stage recipes.json for site build
        run: cp merged/recipes.json web/recipes/recipes.json
 
      # ── 6. Generate main site recipe pages ───────────────────────────────────
      - name: Generate main site recipe pages
        working-directory: web/recipes
        env:
          RECIPES_DIR:         "../../recipes"
          OUTPUT_DIR_OVERRIDE: "."
        run: |
          python3 generate.py
          echo "✓ Main site pages generated"
 
      # ── 7. Generate SEO pages ────────────────────────────────────────────────
      - name: Generate SEO pages
        run: |
          cp merged/recipes.json yeschef-seo/recipes.json
          cd yeschef-seo
          RECIPES_DIR=../recipes OUTPUT_DIR_OVERRIDE=output python3 generate.py
          echo "✓ SEO pages generated"
 
      # ── 8. Deploy web/ to gh-pages — CNAME written every time ────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          cname: tryyeschef.app
          force_orphan: false
          commit_message: "deploy: auto-build from ${{ github.sha }}"